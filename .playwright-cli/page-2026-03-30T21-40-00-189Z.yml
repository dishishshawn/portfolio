        - heading "Engineering with technical depth and real-world intent." [level=2] [ref=e235]
        - paragraph [ref=e236]: I’m Shawn Agarwal, an Electrical Engineering student at the University of Oklahoma with a strong interest in robotics, embedded systems, machine learning, semiconductor devices, and applied physics. I enjoy building projects that connect theory to real hardware, whether that means designing circuits, training intelligent systems, or leading technical teams through the full design process.
        - paragraph [ref=e237]: My experience spans undergraduate research, machine learning, robotics, and electronics. I’ve worked on thin-film materials and device-related research, AI-based data projects, and student engineering systems that combine hardware, software, and problem-solving.
        - paragraph [ref=e238]: I’m driven by curiosity, technical depth, and the challenge of turning complex ideas into real, working systems. Long term, I hope to continue into graduate study and contribute to advanced research in electronics, quantum materials, or robotics.
